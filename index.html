<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>π节：最小包围圆挑战</title>
    <style>
        body { text-align: center; font-family: sans-serif; background: #f4f4f9; margin: 0; padding-top: 10px;}
        canvas { background: white; border: 2px solid #333; cursor: crosshair; touch-action: none; max-width: 95vw; box-shadow: 0 4px 8px rgba(0,0,0,0.1);}
        #header { display: flex; justify-content: space-between; max-width: 95vw; margin: 0 auto 5px; font-size: 14px; font-weight: bold; color: #314159;}
        #info { margin: 10px auto; font-size: 15px; font-weight: bold; color: #333; height: 40px; width: 95vw; word-wrap: break-word;}
        button { padding: 12px 24px; font-size: 18px; font-weight: bold; cursor: pointer; background: #314159; color: white; border: none; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.2);}
        button:disabled { background: #95a5a6; cursor: not-allowed; box-shadow: none;}
    </style>
</head>
<body>

    <h3 style="margin:5px 0">最小包围圆挑战</h3>
    <div id="header">
        <span id="levelText">关卡: 1 / 5</span>
        <span id="attemptsText" style="color: #e67e22;">剩余机会: 3</span>
        <span id="scoreText">总分: 0</span>
    </div>
    <div id="info">单指拖拽绘制圆。完全包围所有图形即可得分。</div>
    <canvas id="gameCanvas" width="400" height="400"></canvas>
    <br><br>
    <button id="actionBtn" onclick="nextAction()" disabled>请先完成本关</button>

<script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    const info = document.getElementById('info');
    const levelText = document.getElementById('levelText');
    const attemptsText = document.getElementById('attemptsText');
    const scoreText = document.getElementById('scoreText');
    const actionBtn = document.getElementById('actionBtn');

    let currentLevel = 1;
    let totalScore = 0;
    let attemptsLeft = 3; // 新增：单关剩余机会
    let gameState = 'PLAYING'; 

    let polygons = [];
    let allVertices = [];
    let isDrawing = false;
    let userCenter = null;
    let userRadius = 0;
    let optimalCircle = null;

    // --- 数学计算模块 (Welzl算法) ---
    function dist(p1, p2) { return Math.hypot(p1.x - p2.x, p1.y - p2.y); }
    function isInside(p, c) { return dist(p, c) <= c.r + 1e-7; }
    function circleFrom2(A, B) { return { x: (A.x + B.x) / 2, y: (A.y + B.y) / 2, r: dist(A, B) / 2 }; }
    function circleFrom3(A, B, C) {
        const d = 2 * (A.x * (B.y - C.y) + B.x * (C.y - A.y) + C.x * (A.y - B.y));
        if (Math.abs(d) < 1e-7) return circleFrom2(A, B);
        const aSq = A.x*A.x + A.y*A.y, bSq = B.x*B.x + B.y*B.y, cSq = C.x*C.x + C.y*C.y;
        const ux = (aSq * (B.y - C.y) + bSq * (C.y - A.y) + cSq * (A.y - B.y)) / d;
        const uy = (aSq * (C.x - B.x) + bSq * (A.x - C.x) + cSq * (B.x - A.x)) / d;
        return { x: ux, y: uy, r: dist({x:ux, y:uy}, A) };
    }
    function trivialCircle(R) {
        if (R.length === 0) return { x: 0, y: 0, r: 0 };
        if (R.length === 1) return { x: R[0].x, y: R[0].y, r: 0 };
        if (R.length === 2) return circleFrom2(R[0], R[1]);
        return circleFrom3(R[0], R[1], R[2]);
    }
    function welzlHelper(P, R, n) {
        if (n === 0 || R.length === 3) return trivialCircle(R);
        const p = P[n - 1];
        const c = welzlHelper(P, R, n - 1);
        if (isInside(p, c)) return c;
        R.push(p);
        const nextC = welzlHelper(P, R, n - 1);
        R.pop();
        return nextC;
    }
    function getExactMEC(points) {
        const P = [...points];
        for (let i = P.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [P[i], P[j]] = [P[j], P[i]];
        }
        return welzlHelper(P, [], P.length);
    }

    // --- 游戏逻辑模块 ---
    function generatePolygon(cx, cy, radius, sides) {
        let pts = [];
        let angleStep = (Math.PI * 2) / sides;
        for(let i=0; i<sides; i++){
            let angle = i * angleStep + (Math.random() - 0.5) * angleStep * 0.5;
            let r = radius * (0.5 + Math.random() * 0.5);
            pts.push({ x: cx + Math.cos(angle) * r, y: cy + Math.sin(angle) * r });
        }
        return pts;
    }

    function initLevel() {
        polygons = [];
        allVertices = [];
        gameState = 'PLAYING';
        attemptsLeft = 3; // 重置机会
        
        let numShapes = 2 + currentLevel; 
        const canvasSize = 400;
        const maxRadius = 50; 
        const safeArea = canvasSize - 2 * maxRadius; 
        
        for (let i = 0; i < numShapes; i++) {
            const sides = Math.floor(Math.random() * 4) + 3;
            const radius = currentLevel >= 3 ? Math.random() * 30 + 20 : 30; 
            const cx = maxRadius + Math.random() * safeArea;
            const cy = maxRadius + Math.random() * safeArea;
            const poly = generatePolygon(cx, cy, radius, sides);
            polygons.push(poly);
            allVertices.push(...poly);
        }

        optimalCircle = getExactMEC(allVertices);
        userCenter = null;
        userRadius = 0;
        
        levelText.innerText = `关卡: ${currentLevel} / 5`;
        attemptsText.innerText = `剩余机会: ${attemptsLeft}`;
        info.innerText = "拖拽绘制。圆必须完全包住所有图形。";
        info.style.color = "#333";
        actionBtn.innerText = "请先完成本关";
        actionBtn.disabled = true;
        draw();
    }

    function getPointerPos(e) {
        const rect = canvas.getBoundingClientRect();
        const scaleX = canvas.width / rect.width;
        const scaleY = canvas.height / rect.height;
        const clientX = e.touches ? e.touches[0].clientX : e.clientX;
        const clientY = e.touches ? e.touches[0].clientY : e.clientY;
        return { x: (clientX - rect.left) * scaleX, y: (clientY - rect.top) * scaleY };
    }

    function startInteraction(e) {
        if(gameState !== 'PLAYING') return;
        e.preventDefault();
        userCenter = getPointerPos(e);
        userRadius = 0;
        isDrawing = true;
        // 开始新绘制时，将提示文字重置为中性
        if(attemptsLeft > 0) {
            info.innerText = `绘制中... (剩余机会: ${attemptsLeft})`;
            info.style.color = "#333";
        }
    }

    function moveInteraction(e) {
        if (!isDrawing || gameState !== 'PLAYING') return;
        e.preventDefault();
        const pos = getPointerPos(e);
        userRadius = dist(userCenter, pos);
        draw();
    }

    function endInteraction(e) {
        if (!isDrawing || gameState !== 'PLAYING') return;
        e.preventDefault();
        isDrawing = false;
        checkResult();
    }

    canvas.addEventListener('mousedown', startInteraction);
    canvas.addEventListener('mousemove', moveInteraction);
    canvas.addEventListener('mouseup', endInteraction);
    canvas.addEventListener('touchstart', startInteraction, {passive: false});
    canvas.addEventListener('touchmove', moveInteraction, {passive: false});
    canvas.addEventListener('touchend', endInteraction, {passive: false});

    // --- 渲染与判定模块 ---
    function draw() {
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        polygons.forEach((poly, idx) => {
            ctx.beginPath();
            ctx.moveTo(poly[0].x, poly[0].y);
            for(let i=1; i<poly.length; i++) ctx.lineTo(poly[i].x, poly[i].y);
            ctx.closePath();
            ctx.fillStyle = `hsl(${idx * 40 + currentLevel*20}, 70%, 60%)`;
            ctx.fill();
            ctx.strokeStyle = "#333";
            ctx.lineWidth = 1;
            ctx.stroke();
        });

        if (userCenter) {
            ctx.beginPath();
            ctx.arc(userCenter.x, userCenter.y, userRadius, 0, Math.PI * 2);
            ctx.fillStyle = "rgba(49, 65, 89, 0.2)";
            ctx.fill();
            ctx.strokeStyle = "#314159";
            ctx.lineWidth = 2;
            ctx.stroke();
        }

        if(gameState === 'DONE' && optimalCircle) {
            ctx.beginPath();
            ctx.arc(optimalCircle.x, optimalCircle.y, optimalCircle.r, 0, Math.PI * 2);
            ctx.strokeStyle = "#27ae60";
            ctx.setLineDash([4, 4]);
            ctx.lineWidth = 2;
            ctx.stroke();
            ctx.setLineDash([]);
        }
    }

    function checkResult() {
        let allInside = true;
        allVertices.forEach(p => {
            if (dist(p, userCenter) > userRadius + 2) allInside = false;
        });

        if (!allInside) {
            attemptsLeft--;
            attemptsText.innerText = `剩余机会: ${attemptsLeft}`;
            
            if (attemptsLeft > 0) {
                // 还有机会，允许重绘，状态不变
                info.innerText = `❌ 未完全包围图形，请重新绘制！(还剩 ${attemptsLeft} 次)`;
                info.style.color = "#e74c3c";
                draw();
                return; 
            } else {
                // 机会用尽，锁定关卡得分为0
                gameState = 'DONE';
                info.innerText = "❌ 3次机会已用尽，本关得分为 0！";
                info.style.color = "#e74c3c";
                draw(); // 重绘显示最优解
            }
        } else {
            // 成功包裹，锁定关卡并计算得分
            gameState = 'DONE';
            const optimalArea = Math.PI * optimalCircle.r * optimalCircle.r;
            const userArea = Math.PI * userRadius * userRadius;
            
            let rawErrorRatio = (userArea - optimalArea) / optimalArea;
            if (rawErrorRatio < 0) rawErrorRatio = 0; 
            
            let score = 100 * (1 - rawErrorRatio);
            score = Math.max(0, Math.min(100, score)); 
            
            totalScore += score;
            scoreText.innerText = `总分: ${totalScore.toFixed(0)}`;
            
            info.innerText = `✅ 挑战成功！得分: ${score.toFixed(1)} / 100\n(面积误差: ${(rawErrorRatio * 100).toFixed(1)}%)`;
            info.style.color = "#27ae60";
            
            draw(); 
        }

        // 仅在当前关卡锁定(DONE)时解锁下一关按钮
        if (gameState === 'DONE') {
            actionBtn.disabled = false;
            if (currentLevel < 5) {
                actionBtn.innerText = "进入下一关";
            } else {
                actionBtn.innerText = "查看最终成绩";
                gameState = 'FINISHED';
            }
        }
    }

    function nextAction() {
        if (gameState === 'DONE' && currentLevel < 5) {
            currentLevel++;
            initLevel();
        } else if (gameState === 'FINISHED') {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            info.innerText = `🎉 挑战结束！\n您的总成绩为: ${totalScore.toFixed(1)} / 500`;
            info.style.color = "#314159";
            attemptsText.innerText = "";
            actionBtn.innerText = "重新开始挑战";
            gameState = 'RESTART';
        } else if (gameState === 'RESTART') {
            currentLevel = 1;
            totalScore = 0;
            scoreText.innerText = `总分: 0`;
            initLevel();
        }
    }

    initLevel();
</script>
</body>
</html>
